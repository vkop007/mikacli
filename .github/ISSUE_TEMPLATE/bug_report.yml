name: Bug report
description: Report a reproducible bug in MikaCLI.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you expected and what happened instead.
      placeholder: mikacli social x post ... returned ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact commands when possible. Redact secrets before posting.
      placeholder: |
        1. Run `mikacli ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share your OS, Bun version, Node version, and any relevant binaries.
      placeholder: macOS 15, Bun 1.3.6, Node 20.11, ffmpeg installed
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any helpful output. Remove cookies, tokens, and private data first.
